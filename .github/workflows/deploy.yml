name: 🚀 Deploy to s-global.space

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            
            cd /root/dominion
            echo "📥 Pulling latest changes..."
            git pull origin main
            
            echo "📦 Building frontend SPA..."
            cd frontend
            npm ci
            npm run build
            
            if [ ! -f dist/index.html ]; then
              echo "❌ FATAL: frontend/dist/index.html not found!"
              exit 1
            fi
            cd ..
            
            echo "🔧 Updating nginx config..."
            cp nginx/s-global.conf /etc/nginx/sites-available/s-global.space
            ln -sf /etc/nginx/sites-available/s-global.space /etc/nginx/sites-enabled/s-global.space
            
            echo "🐳 Restarting Docker containers..."
            docker-compose down
            docker-compose up -d --build
            
            echo "🔄 Reloading nginx..."
            nginx -t && systemctl reload nginx
            
            echo "⏳ Waiting for app to start..."
            sleep 10
            
            echo "🏥 Health check..."
            curl -sf http://127.0.0.1:8001/health || echo "⚠️ Health check failed"
            
            echo "✅ Deploy complete: $(date)"

# ============================================================
# 📋 ИНСТРУКЦИЯ ДЛЯ МАСТЕРА:
# 
# Добавь следующие Secrets в GitHub репозиторий:
# Settings → Secrets and variables → Actions → New repository secret
#
# 1. SERVER_HOST    = 89.169.39.111  (или s-global.space)
# 2. SERVER_USER    = root           (или ваш SSH-пользователь)
# 3. SSH_PRIVATE_KEY = (содержимое файла ~/.ssh/id_rsa)
#
# После добавления секретов, каждый `git push origin main`
# автоматически обновит сервер s-global.space.
# ============================================================
