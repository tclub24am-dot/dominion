name: 🚀 Deploy to s-global.space

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Сборка фронтенда в GitHub Actions
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build frontend SPA
        working-directory: frontend
        run: npm run build

      - name: ✅ Verify build output
        run: |
          if [ ! -f frontend/dist/index.html ]; then
            echo "❌ FATAL: frontend/dist/index.html not found!"
            exit 1
          fi
          echo "✅ Build verified: frontend/dist/index.html exists"
          ls -la frontend/dist/

      - name: 📤 Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────
  # Job 2: Деплой на сервер 89.169.39.111
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: 📂 Copy dist to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "frontend-dist/*"
          target: "/root/dominion/frontend/dist/"
          strip_components: 1
          overwrite: true
          rm: true

      - name: 🔐 Activate frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e

            # 1. Снимаем защиту с папок, чтобы Nginx всё видел
            chmod 755 /root
            chmod -R 755 /root/dominion/frontend/dist

            # 2. Перезагружаем Nginx (без Docker, напрямую)
            systemctl reload nginx || systemctl restart nginx

            # 3. Проверка
            echo "✅ Дизайн Доминиона доставлен и активирован."

# ============================================================
# 📋 АРХИТЕКТУРА ДЕПЛОЯ (ЧИСТЫЙ ПУТЬ v59.0):
#
# Job 1 (build):
#   - Собирает фронтенд в GitHub Actions (Node.js 20)
#   - Загружает dist/ как артефакт
#
# Job 2 (deploy):
#   - Скачивает артефакт
#   - Копирует dist/ на сервер через SCP
#   - Устанавливает права доступа для Nginx
#   - Перезагружает Nginx (без Docker)
#
# Секреты (уже настроены):
#   SERVER_HOST    = 89.169.39.111
#   SERVER_USER    = root
#   SSH_PRIVATE_KEY = (приватный SSH ключ)
# ============================================================
