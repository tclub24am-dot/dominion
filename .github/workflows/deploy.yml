name: 🚀 Deploy to s-global.space

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Сборка фронтенда в GitHub Actions
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install & Build frontend
        run: cd frontend && npm ci && npm run build

      - name: ✅ Verify build output
        run: |
          if [ ! -f frontend/dist/index.html ]; then
            echo "❌ FATAL: frontend/dist/index.html not found!"
            exit 1
          fi
          echo "✅ Build verified: frontend/dist/index.html exists"
          ls -la frontend/dist/

      - name: 📤 Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────
  # Job 2: Деплой на сервер 89.169.39.111
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Checkout repository (for nginx config)
        uses: actions/checkout@v4

      - name: 📥 Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 📁 Create target directory on server
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /var/www/dominion/frontend/dist"

      - name: 📂 Rsync dist to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
            frontend-dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/dominion/frontend/dist/

      - name: 📤 Rsync Nginx config to server
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no" \
            nginx/s-global.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/dominion/nginx/s-global.conf

      - name: Activate frontend via SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "set -e
             chown -R www-data:www-data /var/www/dominion && chmod -R 755 /var/www/dominion
             echo '✅ Дизайн Доминиона доставлен.'"

      - name: 🔗 Link and Reload Nginx
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "set -e
             mkdir -p /etc/nginx/sites-enabled
             ln -sf /var/www/dominion/nginx/s-global.conf /etc/nginx/sites-enabled/s-global.conf &&
             nginx -t &&
             systemctl reload nginx &&
             echo '✅ Nginx конфиг активирован из репозитория. Цитадель освещена.'"

# ============================================================
# 📋 АРХИТЕКТУРА ДЕПЛОЯ (VERSHINA v200.25 — ФИНАЛЬНАЯ ГЕРМЕТИЗАЦИЯ):
#
# Job 1 (build):
#   - Собирает фронтенд в GitHub Actions (Node.js 20)
#   - cd frontend && npm ci && npm run build
#   - Загружает dist/ как артефакт
#
# Job 2 (deploy):
#   - Checkout репозитория (для nginx/s-global.conf)
#   - Скачивает артефакт frontend-dist
#   - Rsync frontend/dist/ → /var/www/dominion/frontend/dist/
#   - Rsync nginx/s-global.conf → /var/www/dominion/nginx/s-global.conf
#   - Устанавливает права доступа для Nginx (chown www-data)
#   - Создаёт симлинк: sites-enabled/s-global.conf → /var/www/dominion/nginx/s-global.conf
#   - nginx -t (проверка конфига)
#   - systemctl reload nginx (активация без даунтайма)
#
# Секреты (GitHub Secrets):
#   SSH_PRIVATE_KEY = (приватный SSH ключ)
#   SERVER_USER     = (пользователь на сервере)
#   SERVER_HOST     = 89.169.39.111
#   SERVER_PORT     = (SSH порт, обычно 22)
# ============================================================
