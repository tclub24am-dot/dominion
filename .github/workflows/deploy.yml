name: 🚀 Deploy to s-global.space
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.39.111
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m # УВЕЛИЧИЛИ ВРЕМЯ ОЖИДАНИЯ
          script: |
            cd /root/dominion
            # РЕШАЕМ ПРОБЛЕМУ С ПРАВАМИ ГИТА
            git config --global --add safe.directory /root/dominion
            
            # ЗАБИРАЕМ КОД
            git fetch origin main
            git reset --hard origin/main
            
            # ЧИСТАЯ СБОРКА
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            
            # АВТО-МИГРАЦИИ ПРИ КАЖДОМ ДЕПЛОЕ
            docker exec dominion_app alembic upgrade head
