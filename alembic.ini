# alembic.ini
# S-GLOBAL DOMINION — Конфигурация миграций БД

[alembic]
# Путь к папке с миграциями
script_location = alembic

# Шаблон имён файлов миграций
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Часовой пояс для имён файлов
timezone = Europe/Moscow

# Максимальная длина slug
truncate_slug_length = 40

# Версионная таблица
version_table = alembic_version

# Разделитель версий (для ветвления)
version_path_separator = os

# URL подключения к БД (синхронный psycopg2 для Alembic)
# ВАЖНО: asyncpg → psycopg2 для миграций
sqlalchemy.url = postgresql+psycopg2://dominion_user:MasterSpartak777!@db/dominion_db

[post_write_hooks]
# Форматирование кода после генерации миграций (опционально)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
