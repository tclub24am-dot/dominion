<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominion Login</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at 50% 45%, rgba(212,175,55,0.12), rgba(13,12,11,0.98) 65%), #0D0C0B;
            color: #FDFCF0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            width: 420px;
            background: rgba(12, 10, 8, 0.85);
            border: 1px solid rgba(212,175,55,0.65);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            backdrop-filter: blur(18px);
        }
        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.22em;
            font-size: 20px;
            margin: 0 0 18px;
            color: #FFD700;
        }
        label { font-size: 12px; color: #D4AF37; letter-spacing: 0.12em; }
        input {
            width: 100%;
            margin: 8px 0 16px;
            padding: 10px 12px;
            background: #FDFCF0;
            color: #1A1A1A;
            border: 1px solid rgba(212,175,55,0.75);
            border-radius: 10px;
            font-weight: 600;
        }
        button {
            width: 100%;
            padding: 10px 12px;
            background: #FDFCF0;
            color: #8B6508;
            border: 1px solid rgba(212,175,55,0.75);
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.12em;
            cursor: pointer;
        }
        .hint { margin-top: 12px; font-size: 11px; color: #b6a77a; }
    </style>
</head>
<body>
    <div class="card">
        <h1>IVORY LUXE ACCESS</h1>
        <label>USERNAME</label>
        <input id="username" placeholder="Master">
        <label>PASSWORD</label>
        <input id="password" type="password" placeholder="••••••••">
        <button id="loginBtn">ENTER</button>
        <div class="hint">Закрытый объект. Доступ только для элитного персонала.</div>
    </div>
    <script>
        const btn = document.getElementById('loginBtn');
        btn.onclick = async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) {
                const params = new URLSearchParams(window.location.search);
                const next = params.get('next');
                window.location.href = next ? (next.startsWith('/') ? next : '/' + next) : '/';
            } else {
                let msg = 'Доступ отклонен';
                try {
                    const data = await res.json();
                    if (data?.detail) msg = data.detail;
                } catch {}
                alert(msg);
            }
        };
    </script>
</body>
<script src="/static/js/global_back.js"></script>
</html>
