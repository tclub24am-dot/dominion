<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analyst</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0b0b12;--glass:rgba(255,255,255,0.04);--border:rgba(225,78,202,0.35);--text:#e8eaf6;--muted:#9aa5ce;--accent:#1d8cf8;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;}
        .wrap{padding:24px;}
        .title{font-family:'Orbitron',sans-serif;letter-spacing:0.2em;margin-bottom:12px;}
        .panel{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px;}
        .kpi{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--accent);}
        .hint{margin-top:10px;color:var(--muted);font-size:12px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">AI АНАЛИТИК</div>
        <div class="panel">
            <div class="kpi">ORACLE INSIGHT</div>
            <div class="hint">Поток стабилен. Аномалий не обнаружено. Ожидаем следующую волну.</div>
        </div>
    </div>
</body>
<script src="/static/js/global_back.js"></script>
    <script src="/static/js/global_ui.js"></script>
</html>
