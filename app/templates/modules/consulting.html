<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulting & IT</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0b0b12;--glass:rgba(255,255,255,0.04);--border:rgba(225,78,202,0.35);--text:#e8eaf6;--muted:#9aa5ce;--accent:#1d8cf8;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;}
        .wrap{padding:24px;}
        .title{font-family:'Orbitron',sans-serif;letter-spacing:0.2em;margin-bottom:14px;}
        .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
        .col{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:12px;min-height:280px;}
        .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;margin-top:8px;font-size:12px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">КОНСАЛТИНГ И IT</div>
        <div class="kanban">
            <div class="col">
                <strong>Backlog</strong>
                <div class="card">CRM интеграции</div>
                <div class="card">Панель KPI v110</div>
            </div>
            <div class="col">
                <strong>В работе</strong>
                <div class="card">Модуль аналитики</div>
                <div class="card">Pipeline клиентов</div>
            </div>
            <div class="col">
                <strong>Завершено</strong>
                <div class="card">Шаблоны UI</div>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/global_back.js"></script>
    <script src="/static/js/global_ui.js"></script>
</html>
