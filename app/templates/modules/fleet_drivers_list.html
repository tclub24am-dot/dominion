<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исполнители • S-GLOBAL DOMINION</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0D0C0B;--panel:rgba(13,12,11,0.95);--border:rgba(212,175,55,0.2);--text:#f4efe0;--muted:#9a8e6e;--accent:#D4AF37;--accent-2:#FFD700;--danger:#ff4444;--success:#23c981;--info:#5b9aff;--warn:#ffb347;--secondary:#6c757d;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;min-height:100vh;padding-bottom:80px;font-size:16px;}
        .page-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 20%, rgba(212,175,55,0.05) 0%, transparent 60%);pointer-events:none;z-index:0;}
        .wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px 24px;}
        .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:13px;opacity:0.7;transition:opacity 0.2s;margin-bottom:10px;}
        .back:hover{opacity:1;}
        
        /* Header */
        .header{display:flex;align-items:center;gap:14px;margin:10px 0 20px;}
        .title{font-family:'Orbitron',sans-serif;letter-spacing:0.15em;font-size:18px;font-weight:700;background:linear-gradient(135deg,#D4AF37,#FFD700,#f4efe0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
        .sub{font-size:12px;color:var(--muted);letter-spacing:0.05em;margin-top:4px;}
        .add-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#0D0C0B;border:none;font-size:26px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 2px 8px rgba(212,175,55,0.3);flex-shrink:0;line-height:1;}
        .add-btn:hover{background:var(--accent-2);transform:scale(1.1);}
        .sync-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.08));border:1px solid var(--border);color:var(--accent);font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all 0.25s;letter-spacing:0.03em;}
        .sync-btn:hover{background:linear-gradient(135deg,rgba(212,175,55,0.25),rgba(212,175,55,0.15));border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,175,55,0.2);}
        .sync-btn:active{transform:translateY(0);}
        .sync-btn.syncing{opacity:0.7;pointer-events:none;}
        .sync-btn .sync-icon{font-size:16px;transition:transform 0.3s;}
        .sync-btn.syncing .sync-icon{animation:spin 1s linear infinite;}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .sync-toast{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(-10px);transition:all 0.3s;pointer-events:none;font-family:'Montserrat',sans-serif;}
        .sync-toast.show{opacity:1;transform:translateY(0);}
        .sync-toast.success{background:rgba(35,201,129,0.95);color:#fff;}
        .sync-toast.error{background:rgba(255,68,68,0.95);color:#fff;}
        .sync-toast.info{background:rgba(91,154,255,0.95);color:#fff;}

        /* Stats badges — стиль Яндекса */
        .stats-badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
        .stat-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
        .stat-badge.green{background:rgba(35,201,129,0.12);color:var(--success);border-color:rgba(35,201,129,0.3);}
        .stat-badge.orange{background:rgba(255,179,71,0.12);color:var(--warn);border-color:rgba(255,179,71,0.3);}
        .stat-badge.red{background:rgba(255,68,68,0.12);color:var(--danger);border-color:rgba(255,68,68,0.3);}
        .stat-badge.blue{background:rgba(91,154,255,0.12);color:var(--info);border-color:rgba(91,154,255,0.3);}
        .stat-badge.gray{background:rgba(154,142,110,0.12);color:var(--muted);border-color:rgba(154,142,110,0.3);}
        .stat-badge .count{font-weight:700;font-size:14px;}

        /* Tabs — стиль Яндекса (underline) */
        .filter-tabs{display:flex;gap:0;border-bottom:2px solid rgba(212,175,55,0.15);margin-bottom:14px;}
        .filter-tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:10px 20px;font-size:14px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;font-weight:500;margin-bottom:-2px;}
        .filter-tab.active{color:var(--accent-2);border-bottom-color:var(--accent);font-weight:700;}
        .filter-tab:hover:not(.active){color:var(--text);border-bottom-color:rgba(212,175,55,0.3);}
        .filter-tab .tab-count{font-size:12px;color:var(--muted);margin-left:4px;}

        /* Search + Park filter */
        .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
        .search{flex:1;min-width:280px;}
        .search input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 16px;font-size:14px;font-family:'Montserrat',sans-serif;outline:none;transition:border-color 0.2s;}
        .search input:focus{border-color:var(--accent);}
        .search input::placeholder{color:var(--muted);}
        .park-select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 16px;font-size:13px;font-family:'Montserrat',sans-serif;outline:none;cursor:pointer;}

        /* Table */
        .table-wrap{background:var(--panel);border-radius:14px;overflow:hidden;}
        .table-scroll{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:15px;}
        th{padding:16px 14px;text-align:left;font-size:12px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(212,175,55,0.1);background:rgba(212,175,55,0.03);white-space:nowrap;font-weight:600;}
        td{padding:14px 14px;border-bottom:none;white-space:nowrap;vertical-align:middle;}
        tr{border-bottom:1px solid rgba(212,175,55,0.04);}
        tr:hover td{background:rgba(212,175,55,0.03);}
        tr:last-child{border-bottom:none;}

        /* Driver name — 18px Bold */
        .driver-name{font-size:18px;font-weight:700;color:var(--text);}
        .driver-link{color:var(--text);text-decoration:none;transition:color 0.2s;}
        .driver-link:hover{color:var(--accent-2);text-decoration:underline;}
        .driver-sub{font-size:12px;color:var(--muted);margin-top:2px;}

        /* Status */
        .status-cell{display:inline-flex;align-items:center;gap:6px;font-size:13px;}
        .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .status-dot.online{background:var(--success);box-shadow:0 0 6px var(--success);}
        .status-dot.busy{background:var(--success);box-shadow:0 0 6px var(--success);}
        .status-dot.offline{background:var(--secondary);}
        .status-dot.fired{background:var(--danger);}
        .status-dot.blocked{background:var(--danger);}

        /* Balance — крупно, минус красный */
        .balance-cell{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;}
        .balance-neg{color:var(--danger) !important;}
        .balance-pos{color:var(--text);}
        .balance-zero{color:var(--muted);}
        .balance-limit{font-size:12px;color:var(--muted);margin-left:4px;}

        /* Rating */
        .rating-cell{font-weight:600;font-size:14px;}
        .rating-good{color:var(--success);}
        .rating-warn{color:var(--warn);}
        .rating-bad{color:var(--danger);}

        /* Vehicle plate */
        .plate-tag{font-size:13px;color:var(--text);background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.15);border-radius:6px;padding:3px 8px;font-weight:500;letter-spacing:0.03em;}

        /* License */
        .license-cell{font-size:12px;color:var(--muted);}
        .license-expiring{color:var(--warn);font-weight:600;}
        .license-expired{color:var(--danger);font-weight:700;}
        .license-ok{color:var(--muted);}

        /* Experience */
        .exp-cell{font-size:13px;color:var(--muted);}

        /* Avatar */
        .avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid var(--border);}
        .avatar-placeholder{width:38px;height:38px;border-radius:50%;background:rgba(212,175,55,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);border:1px solid var(--border);font-weight:600;}

        .park-badge{display:inline-block;background:rgba(212,175,55,0.1);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;}
        .empty-msg{text-align:center;padding:50px;color:var(--muted);font-size:16px;}

        /* Bottom panel */
        .bottom-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(13,12,11,0.98);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:center;gap:28px;z-index:50;backdrop-filter:blur(10px);}
        .bottom-stat{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;}
        .bottom-stat .status-dot{width:10px;height:10px;}
        .bottom-stat .count{font-size:17px;font-weight:800;}

        /* Toast */
        .toast{position:fixed;bottom:80px;right:24px;background:rgba(35,201,129,0.95);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;opacity:0;transform:translateY(20px);transition:all 0.3s;}
        .toast.show{opacity:1;transform:translateY(0);}
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="wrap">
        <a class="back" href="/fleet">← Командная башня</a>
        
        <div class="header">
            <div>
                <div class="title">ИСПОЛНИТЕЛИ</div>
                <div class="sub">Водители Империи • Яндекс Fleet API</div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;margin-left:auto;">
                <button class="sync-btn" id="syncBtn" title="Полная синхронизация с Яндекс (водители, ВУ, стаж, рейтинг, авто, транзакции)">
                    <span class="sync-icon">🔄</span> Синхронизировать
                </button>
                <button class="add-btn" title="Новый водитель">+</button>
            </div>
        </div>
        <!-- Sync toast notification -->
        <div class="sync-toast" id="syncToast"></div>

        <!-- Stats badges — как в Яндексе -->
        <div class="stats-badges" id="statsBadges">
            <div class="stat-badge green">Активные: <span class="count" id="statActive">0</span></div>
            <div class="stat-badge orange">Офлайн: <span class="count" id="statOffline">0</span></div>
            <div class="stat-badge red">Долг: <span class="count" id="statDebt">0</span></div>
            <div class="stat-badge gray">Архив: <span class="count" id="statArchive">0</span></div>
        </div>

        <!-- Filter tabs — стиль Яндекса -->
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab" data-filter="">Работает <span class="tab-count" id="tabAll"></span></button>
            <button class="filter-tab active" data-filter="active">Активные <span class="tab-count" id="tabActive"></span></button>
            <button class="filter-tab" data-filter="warnings">Долг <span class="tab-count" id="tabDebt"></span></button>
            <button class="filter-tab" data-filter="archive">Архив <span class="tab-count" id="tabArchive"></span></button>
        </div>

        <!-- Search + Park -->
        <div class="controls">
            <div class="search">
                <input type="text" id="searchInput" placeholder="Поиск по имени, ВУ или позывному...">
            </div>
            <select class="park-select" id="parkSelect">
                <option value="ALL">Все парки</option>
                <option value="PRO">PRO</option>
                <option value="GO">GO</option>
                <option value="PLUS">PLUS</option>
                <option value="EXPRESS">EXPRESS</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>ФИО</th>
                            <th>Статус</th>
                            <th>Баланс и лимит</th>
                            <th>Рейтинг</th>
                            <th>Автомобиль</th>
                            <th>ВУ (срок)</th>
                            <th>Стаж</th>
                            <th>Парк</th>
                            <th>Оборот 7д</th>
                        </tr>
                    </thead>
                    <tbody id="driversBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bottom panel -->
    <div class="bottom-panel">
        <div class="bottom-stat"><span class="status-dot online"></span>Онлайн: <span class="count" id="bottomOnline">0</span></div>
        <div class="bottom-stat"><span class="status-dot busy"></span>На заказе: <span class="count" id="bottomBusy">0</span></div>
        <div class="bottom-stat"><span class="status-dot offline"></span>Офлайн: <span class="count" id="bottomOffline">0</span></div>
        <div class="bottom-stat" style="color:var(--danger)">💰 Долг: <span class="count" id="bottomDebt">0</span></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let filterType = 'active';
        let searchQ = '';
        let park = 'ALL';
        let driversData = [];
        const fmt = v => Number(v||0).toLocaleString('ru-RU');

        // Статус → кириллица
        const STATUS_LABELS = {
            online: 'Онлайн',
            busy: 'На заказе',
            offline: 'Офлайн',
            fired: 'Уволен',
            blocked: 'Заблокирован'
        };

        function getInitials(name) {
            if (!name || name === '—') return '?';
            const parts = name.split(' ');
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name[0].toUpperCase();
        }

        function calcExperience(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                const now = new Date();
                const years = Math.floor((now - d) / (365.25 * 24 * 60 * 60 * 1000));
                if (years < 1) return '<1 г.';
                return years + ' г.';
            } catch(e) { return '—'; }
        }

        function formatLicenseExpiry(dateStr) {
            if (!dateStr) return '<span class="license-cell">—</span>';
            try {
                const d = new Date(dateStr);
                const now = new Date();
                const daysLeft = Math.floor((d - now) / (24 * 60 * 60 * 1000));
                const formatted = d.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
                if (daysLeft < 0) return `<span class="license-expired">⚠ Истёк ${formatted}</span>`;
                if (daysLeft < 90) return `<span class="license-expiring">⏰ ${formatted}</span>`;
                return `<span class="license-ok">${formatted}</span>`;
            } catch(e) { return '<span class="license-cell">—</span>'; }
        }

        function updateStats() {
            let online=0, busy=0, offline=0, debt=0;
            driversData.forEach(d => {
                if (d.status === 'online') online++;
                else if (d.status === 'busy') busy++;
                else offline++;
                if (d.driver_balance < 0) debt++;
            });
            
            // EXORCISM v200.11: statActive обновляется из бэкенда (active_30d), не перезаписываем
            document.getElementById('statOffline').textContent = offline;
            document.getElementById('statDebt').textContent = debt;
            
            document.getElementById('bottomOnline').textContent = online;
            document.getElementById('bottomBusy').textContent = busy;
            document.getElementById('bottomOffline').textContent = offline;
            document.getElementById('bottomDebt').textContent = debt;
        }

        function renderTable() {
            let items = driversData || [];
            
            // Мгновенный поиск по ФИО, телефону, ВУ, номеру авто
            if (searchQ) {
                const q = searchQ.toLowerCase();
                items = items.filter(d =>
                    (d.full_name||'').toLowerCase().includes(q) ||
                    (d.phone||'').toLowerCase().includes(q) ||
                    (d.license_number||'').toLowerCase().includes(q) ||
                    (d.vehicle_plate||'').toLowerCase().includes(q)
                );
            }

            const tbody = document.getElementById('driversBody');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-msg">Нет данных</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(d => {
                // Avatar
                const avatar = d.photo_url
                    ? `<img class="avatar" src="${d.photo_url}" alt="">`
                    : `<span class="avatar-placeholder">${getInitials(d.full_name)}</span>`;
                
                // Status
                const statusLabel = STATUS_LABELS[d.status] || 'Офлайн';
                const dotCls = d.status || 'offline';
                
                // Balance — МИНУС КРАСНЫЙ
                const bal = d.driver_balance || 0;
                const balCls = bal < 0 ? 'balance-neg' : bal > 0 ? 'balance-pos' : 'balance-zero';
                const limitStr = d.balance_limit ? ` <span class="balance-limit">${fmt(d.balance_limit)} ₽</span>` : '';
                
                // Rating
                const rat = d.rating || 0;
                const ratCls = rat >= 4.8 ? 'rating-good' : rat >= 4.5 ? 'rating-warn' : 'rating-bad';
                const ratStr = rat > 0 ? `<span class="rating-cell ${ratCls}">${rat.toFixed(2)}</span>` : '<span style="color:var(--muted)">—</span>';
                
                // Vehicle
                const plate = d.vehicle_plate && d.vehicle_plate !== '—'
                    ? `<span class="plate-tag">${d.vehicle_plate}</span>`
                    : '<span style="color:var(--muted)">—</span>';
                
                // License expiry
                const licenseHtml = formatLicenseExpiry(d.license_expiry);
                
                // Experience
                const expStr = calcExperience(d.experience_from);
                
                // Revenue
                const rev7 = d.revenue_7d > 0
                    ? `<span style="color:var(--accent-2);font-weight:600">${fmt(d.revenue_7d)} ₽</span>`
                    : '<span style="color:var(--muted)">0</span>';

                return `<tr>
                    <td>${avatar}</td>
                    <td>
                        <a class="driver-link" href="/fleet/drivers/${d.id}">
                            <div class="driver-name">${d.full_name}</div>
                        </a>
                        <div class="driver-sub">${d.phone !== '—' && !d.phone.startsWith('driver_') ? d.phone : ''}</div>
                    </td>
                    <td><div class="status-cell"><span class="status-dot ${dotCls}"></span>${statusLabel}</div></td>
                    <td><span class="balance-cell ${balCls}">${fmt(bal)} ₽</span>${limitStr}</td>
                    <td>${ratStr}</td>
                    <td>${plate}</td>
                    <td>${licenseHtml}</td>
                    <td><span class="exp-cell">${expStr}</span></td>
                    <td><span class="park-badge">${d.park_name}</span></td>
                    <td>${rev7}</td>
                </tr>`;
            }).join('');
        }

        async function load() {
            const params = new URLSearchParams();
            if (filterType) params.set('filter_type', filterType);
            if (park !== 'ALL') params.set('park', park);
            const r = await fetch('/api/v1/fleet/drivers-list-data?' + params, { credentials: 'include' });
            if (!r.ok) return;
            const data = await r.json();
            driversData = data.drivers || [];
            const counts = data.counts || {};

            // Обновляем счётчики вкладок
            const total = counts.ALL || 0;
            document.getElementById('tabAll').textContent = `(${total})`;

            // EXORCISM v200.11: Реальный «Активные 30д» с бэкенда
            if (data.active_30d !== undefined) {
                document.getElementById('statActive').textContent = data.active_30d;
            }

            updateStats();
            renderTable();
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterType = btn.dataset.filter || '';
                load();
            });
        });

        // Park select
        document.getElementById('parkSelect').addEventListener('change', e => {
            park = e.target.value;
            load();
        });

        // Мгновенный поиск (80ms debounce)
        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); renderTable(); }, 80);
        });

        load();

        // ═══ SYNC BUTTON HANDLER ═══
        const syncBtn = document.getElementById('syncBtn');
        const syncToast = document.getElementById('syncToast');

        function showToast(msg, type = 'success', duration = 4000) {
            syncToast.textContent = msg;
            syncToast.className = 'sync-toast ' + type + ' show';
            setTimeout(() => { syncToast.classList.remove('show'); }, duration);
        }

        syncBtn.addEventListener('click', async () => {
            if (syncBtn.classList.contains('syncing')) return;
            syncBtn.classList.add('syncing');
            syncBtn.querySelector('.sync-icon').textContent = '⏳';
            try {
                const r = await fetch('/api/v1/fleet/sync/full', { method: 'GET', credentials: 'include' });
                const data = await r.json();
                if (r.ok) {
                    if (data.status === 'already_running') {
                        showToast('⏳ ' + data.message, 'info');
                    } else {
                        showToast('✅ ' + data.message, 'success');
                        // Auto-reload данных через 30 секунд
                        setTimeout(() => { load(); showToast('🔄 Данные обновлены', 'success', 3000); }, 30000);
                    }
                } else {
                    showToast('❌ Ошибка: ' + (data.detail || r.statusText), 'error');
                }
            } catch (e) {
                showToast('❌ Сетевая ошибка: ' + e.message, 'error');
            } finally {
                syncBtn.classList.remove('syncing');
                syncBtn.querySelector('.sync-icon').textContent = '🔄';
            }
        });
    </script>
</body>
</html>
