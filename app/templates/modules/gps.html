<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Monitoring</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0b0b12;--glass:rgba(255,255,255,0.04);--border:rgba(225,78,202,0.35);--text:#e8eaf6;--muted:#9aa5ce;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;}
        .wrap{display:grid;grid-template-columns:1fr 280px;gap:14px;padding:24px;}
        .map{min-height:520px;background:linear-gradient(145deg,rgba(20,24,40,0.9),rgba(8,10,20,0.9));border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;}
        .panel{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;}
        .row{margin:8px 0;font-size:12px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="map">GPS РАДАР + ГЕО‑ЗОНЫ</div>
        <div class="panel">
            <strong>События</strong>
            <div class="row">🟢 Свободны: 41</div>
            <div class="row">🟠 На заказе: 15</div>
            <div class="row">⚫ Офлайн: 0</div>
        </div>
    </div>
</body>
<script src="/static/js/global_back.js"></script>
    <script src="/static/js/global_ui.js"></script>
</html>
