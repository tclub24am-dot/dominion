<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investments</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0b0b12;--glass:rgba(255,255,255,0.04);--border:rgba(225,78,202,0.35);--text:#e8eaf6;--muted:#9aa5ce;--accent:#1d8cf8;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;}
        .wrap{padding:24px;}
        .title{font-family:'Orbitron',sans-serif;letter-spacing:0.2em;margin-bottom:12px;}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
        .card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;}
        .kpi{font-family:'Orbitron',sans-serif;font-size:22px;color:var(--accent);margin-top:6px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">ИНВЕСТИЦИИ И ФОНД</div>
        <div class="grid">
            <div class="card"><div class="muted">Капитал</div><div class="kpi">LIVE</div></div>
            <div class="card"><div class="muted">Фонд</div><div class="kpi">ACTIVE</div></div>
            <div class="card"><div class="muted">Гранты</div><div class="kpi">READY</div></div>
        </div>
    </div>
</body>
<script src="/static/js/global_back.js"></script>
    <script src="/static/js/global_ui.js"></script>
</html>
