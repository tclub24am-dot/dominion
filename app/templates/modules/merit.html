<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merit</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        :root{--bg:#0b0b12;--glass:rgba(255,255,255,0.04);--border:rgba(225,78,202,0.35);--text:#e8eaf6;--muted:#9aa5ce;--accent:#1d8cf8;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;}
        .wrap{padding:24px;}
        .title{font-family:'Orbitron',sans-serif;letter-spacing:0.2em;margin-bottom:12px;}
        .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
        .card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
        .avatar{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
        .avatar img{width:100%;height:100%;object-fit:cover;}
        .avatar.fallback{background:conic-gradient(from 0deg,#ffd27a,#7cffd1);}
        .muted{color:var(--muted);font-size:11px;}
        .kpi{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--accent);}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">ГАРНИЗОН ПОЧЕТА</div>
        <div class="grid" id="meritGrid"></div>
        <input type="file" id="meritPhotoInput" style="display:none" accept="image/*">
    </div>
    <script>
        let pendingMeritDriverId = null;
        const grid = document.getElementById('meritGrid');
        const photoInput = document.getElementById('meritPhotoInput');

        function renderMerit(list){
            if (!grid) return;
            grid.innerHTML = list.map((d, idx) => `
                <div class="card">
                    <div class="avatar ${d.photo_url ? '' : 'fallback'}" data-driver="${d.user_id}">
                        ${d.photo_url ? `<img src="${d.photo_url}">` : `<span>${d.avatar_text || '★'}</span>`}
                    </div>
                    <div class="kpi">#${idx + 1}</div>
                    <div class="muted">${d.driver_name || 'Без имени'}</div>
                </div>
            `).join('');
            grid.querySelectorAll('.avatar').forEach(el => {
                el.addEventListener('click', () => {
                    pendingMeritDriverId = Number(el.dataset.driver || 0);
                    if (photoInput) photoInput.click();
                });
            });
        }

        if (photoInput) {
            photoInput.onchange = () => {
                if (!photoInput.files.length || !pendingMeritDriverId) return;
                const form = new FormData();
                form.append('file', photoInput.files[0]);
                fetch(`/api/v1/fleet/driver/${pendingMeritDriverId}/photo`, { method: 'POST', body: form })
                    .then(r => r.json())
                    .then(() => location.reload())
                    .catch(() => {});
            };
        }

        fetch('/api/v1/fleet/command-data')
            .then(r => r.json())
            .then(data => renderMerit((data.golden_top || []).slice(0, 5)))
            .catch(() => renderMerit([]));
    </script>
</body>
<script src="/static/js/global_back.js"></script>
    <script src="/static/js/global_ui.js"></script>
</html>
