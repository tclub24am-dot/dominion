{% extends "base.html" %}

{% block title %}Транзакции Казны | S-GLOBAL DOMINION{% endblock %}

{% block content %}
<div class="page-header">
    <h1>💰 Транзакции Казны</h1>
    <p class="muted-text">История финансовых операций</p>
</div>

<div class="card">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl gold-text">Список транзакций</h2>
        <button class="btn-gold">+ Добавить транзакцию</button>
    </div>
    
    <!-- Filters -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <select class="bg-transparent border border-gray-600 rounded-lg p-2 text-white">
            <option value="">Все категории</option>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
        </select>
        <input type="date" class="bg-transparent border border-gray-600 rounded-lg p-2 text-white">
        <input type="date" class="bg-transparent border border-gray-600 rounded-lg p-2 text-white">
        <button class="btn-gold">Применить</button>
    </div>

    <div class="empty-state">
        <h3>Нет данных</h3>
        <p>Транзакции не найдены или данные ещё не загружены</p>
    </div>
</div>
{% endblock %}
