; ============================================================
; S-GLOBAL DOMINION — asterisk/extensions.conf
; Протокол: VERSHINA v200.15
; Dialplan: webhook + tenant isolation
; ============================================================

[globals]
DOMINION_API=http://app:8001
WEBHOOK_PATH=/api/v1/telephony/webhook/asterisk
WEBHOOK_SECRET=${ENV(ATS_WEBHOOK_SECRET)}

[macro-dominion-webhook]
exten => s,1,Set(WEBHOOK_BODY={"Event":"${ARG1}","CallerIDNum":"${ARG3}","Channel":"${ARG4}","Duration":${ARG5},"tenant_id":"${ARG2}","timestamp":"${STRFTIME(${EPOCH},,%Y-%m-%dT%H:%M:%SZ)}","uniqueid":"${UNIQUEID}"})
 same => n,Set(CURL_RESULT=${CURLOPT(httpreqheader=Content-Type: application/json)})
 same => n,Set(CURL_RESULT=${CURLOPT(httpreqheader=X-Webhook-Token: ${WEBHOOK_SECRET})})
 same => n,Set(CURL_RESULT=${CURLOPT(httpreqheader=X-Asterisk-UniqueID: ${UNIQUEID})})
 same => n,Set(CURL_RESULT=${CURLOPT(postdata=${WEBHOOK_BODY})})
 same => n,Set(CURL_RESULT=${CURL(${DOMINION_API}${WEBHOOK_PATH})})
 same => n,NoOp(Dominion webhook [${ARG1}] tenant=${ARG2} caller=${ARG3} result=${CURL_RESULT})
 same => n,MacroExit()

[park_pro]
exten => _X.,1,NoOp(=== S-АТС [PRO] Входящий: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(TENANT_ID=pro)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Macro(dominion-webhook,new_call,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Dial(PJSIP/sip-pro-001,30,tTr)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:missed)
 same => n(answered),Set(CALL_DURATION=$[${EPOCH} - ${CALL_START}])
 same => n,Macro(dominion-webhook,call_answered,${TENANT_ID},${CALLERID(num)},${EXTEN},${CALL_DURATION})
 same => n,Hangup()
 same => n(missed),Macro(dominion-webhook,call_missed,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Hangup()
exten => h,1,NoOp(=== S-АТС [PRO] Завершение: ${CALLERID(num)} duration=${CDR(duration)} ===)
 same => n,Macro(dominion-webhook,call_ended,pro,${CALLERID(num)},${EXTEN},${CDR(duration)})

[park_go]
exten => _X.,1,NoOp(=== S-АТС [GO] Входящий: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(TENANT_ID=go)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Macro(dominion-webhook,new_call,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Dial(PJSIP/sip-go-001,30,tTr)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:missed)
 same => n(answered),Set(CALL_DURATION=$[${EPOCH} - ${CALL_START}])
 same => n,Macro(dominion-webhook,call_answered,${TENANT_ID},${CALLERID(num)},${EXTEN},${CALL_DURATION})
 same => n,Hangup()
 same => n(missed),Macro(dominion-webhook,call_missed,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Hangup()
exten => h,1,NoOp(=== S-АТС [GO] Завершение: ${CALLERID(num)} duration=${CDR(duration)} ===)
 same => n,Macro(dominion-webhook,call_ended,go,${CALLERID(num)},${EXTEN},${CDR(duration)})

