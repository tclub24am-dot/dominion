exten => _X.,1,NoOp(=== S-АТС [PLUS] Входящий: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(TENANT_ID=plus)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Macro(dominion-webhook,new_call,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Dial(PJSIP/sip-plus-001,30,tTr)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:missed)
 same => n(answered),Set(CALL_DURATION=$[${EPOCH} - ${CALL_START}])
 same => n,Macro(dominion-webhook,call_answered,${TENANT_ID},${CALLERID(num)},${EXTEN},${CALL_DURATION})
 same => n,Hangup()
 same => n(missed),Macro(dominion-webhook,call_missed,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Hangup()
exten => h,1,NoOp(=== S-АТС [PLUS] Завершение: ${CALLERID(num)} duration=${CDR(duration)} ===)
 same => n,Macro(dominion-webhook,call_ended,plus,${CALLERID(num)},${EXTEN},${CDR(duration)})

[park_express]
exten => _X.,1,NoOp(=== S-АТС [EXPRESS] Входящий: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(TENANT_ID=express)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Macro(dominion-webhook,new_call,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Dial(PJSIP/sip-express-001,30,tTr)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:missed)
 same => n(answered),Set(CALL_DURATION=$[${EPOCH} - ${CALL_START}])
 same => n,Macro(dominion-webhook,call_answered,${TENANT_ID},${CALLERID(num)},${EXTEN},${CALL_DURATION})
 same => n,Hangup()
 same => n(missed),Macro(dominion-webhook,call_missed,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Hangup()
exten => h,1,NoOp(=== S-АТС [EXPRESS] Завершение: ${CALLERID(num)} duration=${CDR(duration)} ===)
 same => n,Macro(dominion-webhook,call_ended,express,${CALLERID(num)},${EXTEN},${CDR(duration)})

[outbound]
exten => _7XXXXXXXXXX,1,NoOp(=== S-АТС Исходящий: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(TENANT_ID=${CHANNEL(pjsip,endpoint)})
 same => n,Set(CALL_START=${EPOCH})
 same => n,Macro(dominion-webhook,new_call,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Dial(PJSIP/trunk/${EXTEN},60,tTr)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:failed)
 same => n(answered),Set(CALL_DURATION=$[${EPOCH} - ${CALL_START}])
 same => n,Macro(dominion-webhook,call_answered,${TENANT_ID},${CALLERID(num)},${EXTEN},${CALL_DURATION})
 same => n,Hangup()
 same => n(failed),Macro(dominion-webhook,call_missed,${TENANT_ID},${CALLERID(num)},${EXTEN},0)
 same => n,Hangup()
exten => h,1,NoOp(=== S-АТС Исходящий завершён: duration=${CDR(duration)} ===)
 same => n,Macro(dominion-webhook,call_ended,${TENANT_ID},${CALLERID(num)},${EXTEN},${CDR(duration)})

[internal]
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

exten => 9998,1,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Hangup()

[default]
exten => _X.,1,NoOp(=== S-АТС: Неизвестный контекст для ${EXTEN} ===)
 same => n,Hangup(21)
