; ============================================================
; S-GLOBAL DOMINION — asterisk/logger.conf
; Протокол: VERSHINA v200.15
; Логирование Asterisk: файлы + консоль + security
; ============================================================

[general]
appendhostname=no
dateformat=%F %T

[logfiles]
; Основной лог
full => notice,warning,error,debug,verbose,dtmf,fax

; Ошибки
error => error,warning

; Security-лог для fail2ban / аудита
security => security

; Консоль для docker logs dominion_asterisk
console => notice,warning,error,verbose

; При необходимости можно включить отдельный CDR-лог:
; cdr-csv => cdr
