; ============================================================
; S-GLOBAL DOMINION — asterisk/manager.conf
; Протокол: VERSHINA v200.15
; AMI (Asterisk Manager Interface)
; ============================================================

[general]
enabled=yes
bindaddr=0.0.0.0
port=5038
httptimeout=60
displayconnects=yes

[dominion-backend]
secret=%%AMI_SECRET%%
deny=0.0.0.0/0.0.0.0
permit=172.16.0.0/255.240.0.0
permit=10.0.0.0/255.0.0.0
permit=192.168.0.0/255.255.0.0
read=all
write=originate,call,system
eventfilter=Event: Hangup
eventfilter=Event: Newchannel
eventfilter=Event: DialBegin
eventfilter=Event: DialEnd
eventfilter=Event: AgentCalled
eventfilter=Event: AgentComplete

[fail2ban-monitor]
secret=%%F2B_SECRET%%
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255
permit=172.16.0.0/255.240.0.0
read=security
write=
