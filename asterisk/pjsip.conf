; ============================================================
; S-GLOBAL DOMINION — asterisk/pjsip.conf
; Протокол: VERSHINA v200.17 PRODUCTION NAT
; PJSIP транспорт + SaaS-изоляция по tenant_id
; Плейсхолдеры заменяются скриптом init_asterisk_secrets.sh
;
; NAT-КОНФИГУРАЦИЯ (для работы на сервере s-global.space):
;   %%EXTERNAL_IP%% → 89.169.39.111 (подставляется из ENV)
;   local_net → подсеть Docker (172.16.0.0/12)
; ============================================================

[global]
type=global
max_initial_qualify_time=4
default_expiration=3600
min_expiration=60
max_expiration=7200
; Отключаем прямую медиа-передачу — всё через Asterisk (нужно для NAT)
disable_multi_domain=no

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes
; NAT: подставляется скриптом init_asterisk_secrets.sh из EXTERNAL_IP
%%EXTERNAL_SIGNALING_UDP%%
%%EXTERNAL_MEDIA_UDP%%
; Локальные сети (Docker + LAN) — не применяем NAT для них
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16


[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5061
allow_reload=yes
; NAT: подставляется скриптом init_asterisk_secrets.sh из EXTERNAL_IP
%%EXTERNAL_SIGNALING_TCP%%
%%EXTERNAL_MEDIA_TCP%%
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16


[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
allow_reload=yes
; WSS транспорт для WebRTC из браузера
; Nginx проксирует wss://s-global.space/ws-sip/ → asterisk:8089
; NAT для WSS (медиа идёт через DTLS/SRTP, но адрес нужен правильный)
%%EXTERNAL_SIGNALING_WSS%%
%%EXTERNAL_MEDIA_WSS%%



[system-endpoint]
type=endpoint
transport=transport-wss
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=system-auth
aors=system-aors
dtmf_mode=rfc4733
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
webrtc=yes
media_encryption=dtls
use_avpf=yes
ice_support=yes
media_use_received_transport=yes

[system-auth]
type=auth
auth_type=userpass
username=system
password=%%SYSTEM_PASS%%

[system-aors]
type=aor
max_contacts=5
remove_existing=yes

[park-pro-endpoint](!)
type=endpoint
transport=transport-udp
disallow=all
allow=ulaw,alaw,g722
dtmf_mode=rfc4733
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
context=park_pro
auth_rejection_permanent=no
rtp_timeout=60

[sip-pro-001](park-pro-endpoint)
auth=sip-pro-001-auth
aors=sip-pro-001-aors

[sip-pro-001-auth]
type=auth
auth_type=userpass
username=sip-pro-001
password=%%SIP_PRO_001_PASS%%

[sip-pro-001-aors]
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

