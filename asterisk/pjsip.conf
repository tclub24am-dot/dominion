; ============================================================
; S-GLOBAL DOMINION — asterisk/pjsip.conf
; Протокол: VERSHINA v200.15
; PJSIP транспорт + SaaS-изоляция по tenant_id
; Плейсхолдеры заменяются скриптом init_asterisk_secrets.sh
; ============================================================

[global]
type=global
max_initial_qualify_time=4
default_expiration=3600
min_expiration=60
max_expiration=7200

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes
external_media_address=89.169.39.111
external_signaling_address=89.169.39.111

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5061
allow_reload=yes
external_media_address=89.169.39.111
external_signaling_address=89.169.39.111

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
allow_reload=yes
external_media_address=89.169.39.111
external_signaling_address=89.169.39.111

[system-endpoint]
type=endpoint
transport=transport-wss
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=system-auth
aors=system-aors
dtmf_mode=rfc4733
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
webrtc=yes
media_encryption=dtls
use_avpf=yes
ice_support=yes
media_use_received_transport=yes

[system-auth]
type=auth
auth_type=userpass
username=system
password=%%SYSTEM_PASS%%

[system-aors]
type=aor
max_contacts=5
remove_existing=yes

[park-pro-endpoint](!)
type=endpoint
transport=transport-udp
disallow=all
allow=ulaw,alaw,g722
dtmf_mode=rfc4733
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
context=park_pro
auth_rejection_permanent=no
rtp_timeout=60

[sip-pro-001](park-pro-endpoint)
auth=sip-pro-001-auth
aors=sip-pro-001-aors

[sip-pro-001-auth]
type=auth
auth_type=userpass
username=sip-pro-001
password=%%SIP_PRO_001_PASS%%

[sip-pro-001-aors]
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

