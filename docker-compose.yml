version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dominion_db
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - dominion_data:/var/lib/postgresql/data
    networks:
      - dominion_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dominion_redis
    networks:
      - dominion_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: dominion_app
    env_file:
      - ./.env
    environment:
      # Переопределяем REDIS_URL: внутри Docker-сети localhost не работает.
      # Имя сервиса 'redis' резолвится через Docker DNS автоматически.
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dominion_net
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    restart: unless-stopped

volumes:
  dominion_data:
  redis_data:

networks:
  dominion_net:
    driver: bridge
