# ============================================================
# S-GLOBAL DOMINION — nginx SPA Configuration v18.0
# Сервер: 89.169.39.111 / s-global.space
# ============================================================

upstream dominion_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name s-global.space www.s-global.space _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name s-global.space www.s-global.space;

    # SSL (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/s-global.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s-global.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Корень SPA
    root /var/www/dominion/frontend/dist;
    index index.html;

    # ─── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── SPA Assets (Vite build, хешированные имена → долгий кеш) ──
    location /assets/ {
        alias /var/www/dominion/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Статика приложения (шрифты, изображения, CSS) ─────
    location /static/ {
        alias /var/www/dominion/app/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Storage (PDF путевые листы и т.д.) ────────────────
    location /storage/ {
        alias /var/www/dominion/storage/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── API → FastAPI backend ─────────────────────────────
    location /api/ {
        proxy_pass http://dominion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ─── WebSocket ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://dominion_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ─── Health check ──────────────────────────────────────
    location = /health {
        proxy_pass http://dominion_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── SPA Fallback (ВСЁ остальное → index.html) ────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Безопасность ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Лимит размера загрузки (для фото водителей и т.д.)
    client_max_body_size 50M;
}
