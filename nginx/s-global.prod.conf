# ============================================================
# S-GLOBAL DOMINION — nginx/s-global.prod.conf
# Протокол: VERSHINA v200.17 PRODUCTION
# Сервер: 89.169.39.111 / s-global.space
# Режим: Docker-контейнер nginx (внутри dominion_net)
# upstream: frontend:80, app:8001, asterisk:8089, synapse:8008
# ============================================================

# ─── Docker DNS resolver (обязателен для динамических upstream) ─
resolver 127.0.0.11 valid=30s ipv6=off;

# ─── Upstream серверы (Docker DNS внутри dominion_net) ──────
upstream dominion_frontend {
    server frontend:80;
    keepalive 16;
}

upstream dominion_backend {
    server app:8001;
    keepalive 32;
}

# dominion_asterisk_wss — динамический (asterisk может быть недоступен)
# Используем переменную, чтобы nginx не падал при отсутствии asterisk
# upstream dominion_asterisk_wss { server asterisk:8089; }

upstream dominion_synapse {
    server synapse:8008;
    keepalive 8;
}

# ─── HTTP → HTTPS редирект ──────────────────────────────────
server {
    listen 80;
    server_name s-global.space www.s-global.space;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — основной сервер ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name s-global.space www.s-global.space;

    # SSL (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/s-global.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s-global.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ─── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    # ─── Безопасность ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Лимит размера загрузки (для фото водителей и т.д.)
    client_max_body_size 50M;

    # ─── API → FastAPI backend ─────────────────────────────
    location /api/ {
        proxy_pass http://dominion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        # Буферизация для больших ответов (аналитика, отчёты)
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ─── WebSocket (Real-time API) ─────────────────────────
    location /ws/ {
        proxy_pass http://dominion_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ─── Asterisk WebRTC (WSS → ws://asterisk:8089) ────────
    # Браузерные звонки: SIP.js / JsSIP подключаются через wss://s-global.space/ws-sip/
    # Динамический proxy_pass через переменную — nginx не падает если asterisk недоступен
    location /ws-sip/ {
        set $asterisk_upstream http://asterisk:8089;
        proxy_pass $asterisk_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ─── Matrix Synapse (MIKS мессенджер) ──────────────────
    location /_matrix/ {
        proxy_pass http://dominion_synapse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 100M;
    }

    location /_synapse/ {
        proxy_pass http://dominion_synapse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Health check ──────────────────────────────────────
    location = /health {
        proxy_pass http://dominion_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Статика приложения (шрифты, изображения, CSS) ─────
    location /static/ {
        alias /var/www/dominion/app/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Storage (PDF путевые листы и т.д.) ────────────────
    location /storage/ {
        alias /var/www/dominion/storage/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── Frontend SPA (React) ──────────────────────────────
    # Все остальные запросы → frontend контейнер (Nginx с dist/)
    location / {
        proxy_pass http://dominion_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        # SPA: если frontend вернул 404 — отдаём index.html
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://dominion_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
